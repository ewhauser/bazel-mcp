# Optional: set one or more roots to restrict which Bazel workspaces may run.
# Leave the list empty (the built-in default) to allow any Bazel workspace.
allowed_roots = ["/absolute/path/to/bazel/workspaces"]
global_concurrency = 4
# "tail" writes Bazel's binary BEP file and coexists with a remote BES.
# "bes" routes BEP through bazel-mcp's loopback gRPC backend.
bep_transport = "tail"
default_timeout_seconds = 1800
maximum_timeout_seconds = 7200
cancellation_interrupt_grace_seconds = 10
cancellation_terminate_grace_seconds = 5
progress_initial_seconds = 30
progress_interval_seconds = 60
# "auto" negotiates synchronous, legacy 2025-11-25 tasks, or the Tasks extension.
# Use "sync_only" as a host compatibility escape hatch, or "tasks_required"
# only when detached execution is mandatory.
mcp_execution_policy = "auto"
task_ttl_seconds = 86400
task_poll_interval_ms = 2000
redaction_patterns = ["(?i)token=[^\\s]+"]
retention_days = 7
maximum_storage_bytes = 10737418240
# Model-visible tool results: "toon" (the default), "text" (compact JSON),
# "structured", or "both".
retention_cleanup_interval_seconds = 3600
result_encoding = "toon"
supported_bazel_major_versions = [8, 9]
# Set only to explicitly accept an untested Bazel major version.
allow_unsupported_bazel_versions = false
version_check_timeout_seconds = 30
maximum_pending_invocations = 256
# Applied only when output_user_root isolates the server from the user's daemon.
isolated_bazel_server_idle_seconds = 60

# Custom reducers are opt-in and are never loaded from a Bazel workspace
# automatically. Relative paths are resolved from this configuration file.
[starlark]
files = []
max_source_bytes = 262144
max_input_bytes = 1048576
max_events = 10000
max_output_bytes = 65536
max_output_items = 1000
max_ticks = 1000000
max_heap_bytes = 16777216
max_callstack_size = 100
timeout_ms = 100
