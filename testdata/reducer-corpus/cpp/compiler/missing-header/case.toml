schema_version = 1
id = "cpp/compiler/missing-header"
workspace = "examples/cpp"
command = "build"
args = ["//cases:missing_header"]
tags = ["cpp", "compiler", "fast"]
platforms = ["macos"]
timeout_seconds = 300
bazel_version = "9.2.0"

[evidence]

[replay]
max_items = 20
max_bytes = 4096

[expect]
state = "failed"
exit_code = 1
headline_contains = "invoice/does_not_exist.h"
max_visible_bytes = 8192
max_diagnostics = 20

[[expect.diagnostics]]
rank = 0
severity = "error"
category = "compilation"
message_contains = "invoice/does_not_exist.h"
path = "cases/missing_header.cc"
line = 1

[expect.absent]
raw_contains = ["token=", "authorization:"]

[provenance]
tool = "C++ compiler"
tool_version = "platform-default"
origin_repository = "https://github.com/google/googletest"
origin_commit = "a25f43576effe4ebe887412a603cddfa8fc3ba64"

[provenance.rules]
rules_cc = "0.2.22"
