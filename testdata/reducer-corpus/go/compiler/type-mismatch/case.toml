schema_version = 1
id = "go/compiler/type-mismatch"
issue = 97
workspace = "examples/go"
command = "build"
args = ["//cases:compile_failure"]
tags = ["go", "compiler", "fast"]
platforms = ["linux", "macos", "windows"]
timeout_seconds = 300
bazel_version = "9.2.0"

[evidence]

[replay]
max_items = 20
max_bytes = 4096

[expect]
state = "failed"
exit_code = 1
headline_contains = "cannot use"
max_visible_bytes = 8192
max_diagnostics = 20

[[expect.diagnostics]]
rank = 0
severity = "error"
category = "compilation"
message_contains = "cannot use \"USD\""
path = "cases/compile_failure.go"
line = 4
column = 9

[expect.absent]
message_contains = ["INFO: Analyzed target", "Build did NOT complete successfully"]
raw_contains = ["token=", "authorization:"]

[provenance]
tool = "Go compiler"
tool_version = "1.23.4"

[provenance.rules]
rules_go = "0.61.1"
