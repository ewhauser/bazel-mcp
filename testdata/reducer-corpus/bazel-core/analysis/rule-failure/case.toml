schema_version = 1
id = "bazel-core/analysis/rule-failure"
workspace = "examples/bazel-core"
command = "build"
args = ["//cases:analysis_failure"]
tags = ["bazel-core", "analysis", "fast"]
platforms = ["any"]
timeout_seconds = 120
bazel_version = "9.2.0"

[evidence]

[replay]
max_items = 20
max_bytes = 4096

[expect]
state = "failed"
exit_code = 1
headline_contains = "BAZEL_MCP_ANALYSIS_ROOT_CAUSE"
max_visible_bytes = 8192
max_diagnostics = 20

[[expect.diagnostics]]
rank = 0
severity = "error"
category = "analysis"
message_contains = "BAZEL_MCP_ANALYSIS_ROOT_CAUSE"
target = "//cases:analysis_failure"

[expect.absent]
raw_contains = ["token=", "authorization:"]

[provenance]
tool = "Bazel"
tool_version = "9.2.0"

[provenance.rules]
bazel = "9.2.0"
