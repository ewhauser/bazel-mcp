schema_version = 1
id = "protobuf/syntax/failure"
workspace = "examples/protobuf"
command = "build"
args = ["//cases:syntax_failure"]
tags = ["protobuf", "syntax", "fast"]
platforms = ["linux", "macos", "windows"]
timeout_seconds = 300
bazel_version = "9.2.0"

[evidence]

[replay]
max_items = 20
max_bytes = 4096

[expect]
state = "failed"
exit_code = 1
headline_contains = "Expected"
max_visible_bytes = 8192
max_diagnostics = 20

[[expect.diagnostics]]
rank = 0
severity = "error"
category = "compilation"
message_contains = "Expected"
path = "cases/syntax_failure.proto"
line = 5

[expect.absent]
raw_contains = ["token=", "authorization:"]

[provenance]
tool = "protoc"
tool_version = "35.1"

[provenance.rules]
protobuf = "35.1"
