schema_version = 1
id = "starlark/macro/failure"
workspace = "examples/starlark"
command = "build"
args = ["//cases/macro:failure"]
tags = ["starlark", "macro", "fast"]
platforms = ["any"]
timeout_seconds = 180
bazel_version = "9.2.0"

[evidence]

[replay]
max_items = 20
max_bytes = 4096

[expect]
state = "failed"
exit_code = 1
headline_contains = "invoice macro requires a currency"
max_visible_bytes = 8192
max_diagnostics = 20

[[expect.diagnostics]]
rank = 0
severity = "error"
category = "loading"
message_contains = "invoice macro requires a currency"
path = "cases/macro/defs.bzl"
line = 2

[expect.absent]
raw_contains = ["token=", "authorization:"]

[provenance]
tool = "Bazel Starlark evaluator"
tool_version = "9.2.0"

[provenance.rules]
