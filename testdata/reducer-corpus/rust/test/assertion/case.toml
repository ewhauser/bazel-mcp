schema_version = 1
id = "rust/test/assertion"
workspace = "examples/rust"
command = "test"
args = ["//cases:assertion_failure"]
tags = ["rust", "test-log", "fast"]
platforms = ["linux", "macos", "windows"]
timeout_seconds = 300
bazel_version = "9.2.0"
test_target = "//cases:assertion_failure"

[evidence]
test_logs = ["test.log"]

[replay]
max_items = 20
max_bytes = 4096

[expect]
state = "failed"
exit_code = 3
headline_contains = "invoice_total_includes_service_fee"
inspect_hint = "test_log"
max_visible_bytes = 8192
max_diagnostics = 20

[[expect.diagnostics]]
rank = 0
severity = "error"
category = "test"
message_contains = "invoice total should include the service fee"
path = "cases/assertion_failure.rs"
line = 4
target = "//cases:assertion_failure"

[expect.absent]
raw_contains = ["token=", "authorization:"]

[provenance]
tool = "Rust libtest"
tool_version = "1.96.1"

[provenance.rules]
rules_rust = "0.71.3"
