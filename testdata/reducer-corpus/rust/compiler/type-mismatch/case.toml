schema_version = 1
id = "rust/compiler/type-mismatch"
workspace = "examples/rust"
command = "build"
args = ["//cases:type_mismatch"]
tags = ["rust", "compiler", "fast"]
platforms = ["linux", "macos", "windows"]
timeout_seconds = 300
bazel_version = "9.2.0"

[evidence]

[replay]
max_items = 20
max_bytes = 4096

[expect]
state = "failed"
exit_code = 1
headline_contains = "E0308: mismatched types"
max_visible_bytes = 8192
max_diagnostics = 20

[[expect.diagnostics]]
rank = 0
severity = "error"
category = "compilation"
message_contains = "expected `&str`, found `&Option<String>`"
path = "cases/type_mismatch.rs"
line = 2

[expect.absent]
raw_contains = ["token=", "authorization:"]

[provenance]
tool = "rustc"
tool_version = "1.96.1"

[provenance.rules]
rules_rust = "0.71.3"
