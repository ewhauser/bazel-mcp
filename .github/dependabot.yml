version: 2

updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 0

  - package-ecosystem: cargo
    directory: "/fuzz"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 0

  - package-ecosystem: npm
    directories:
      - "/website"
      - "/scripts/compat"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 0

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 0
