name: CI
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
permissions: {}
env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
jobs:
  lint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - run: python3 scripts/check-release-please-config.py
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo install cargo-shear --version 1.12.0 --locked && cargo shear
  bazel-build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - name: Configure Bazel caches
        run: cp .github/workflows/ci.bazelrc "$HOME/.bazelrc"
      # Cache keys are immutable, so an input change creates a new cache while
      # restore-keys loads the most recent compatible cache as a warm baseline.
      - name: Mount Bazel caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/bazel-disk
            ~/.cache/bazel-repo
          key: bazel-cache-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('.bazelversion', '.bazelrc', '.github/workflows/ci.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock', 'Cargo.toml', 'Cargo.lock', '**/BUILD.bazel', '**/*.bzl', '**/*.rs') }}
          restore-keys: |
            bazel-cache-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
      - run: go install github.com/bazelbuild/bazelisk@v1.26.0
      - run: PATH="$HOME/go/bin:$PATH" bazelisk test --config=ci //tools:preset.update_test
      - run: PATH="$HOME/go/bin:$PATH" bazelisk test --config=ci //crates/...
      - run: PATH="$HOME/go/bin:$PATH" make build BAZEL_BUILD_FLAGS=--config=ci
  cargo-test-linux:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - run: cargo test --workspace --all-features
      - run: cargo test --workspace --doc
  cargo-test-macos:
    permissions:
      contents: read
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - run: cargo test --workspace --all-features
  cargo-check-windows:
    permissions:
      contents: read
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - run: cargo check --workspace --all-targets --all-features
  windows-release-smoke:
    permissions:
      contents: read
    runs-on: windows-latest
    timeout-minutes: 30
    # PR CI validates native linking, archive layout, and startup. Tagged releases
    # retain the fully optimized dist profile from Cargo.toml.
    env:
      CARGO_PROFILE_DIST_CODEGEN_UNITS: "16"
      CARGO_PROFILE_DIST_LTO: "off"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - name: Install dist
        shell: pwsh
        run: ./scripts/install-cargo-dist.ps1
      - name: Build Windows release archive
        shell: pwsh
        run: dist build --print=linkage --output-format=json --artifacts=local --target=x86_64-pc-windows-msvc > dist-manifest.json
      - name: Smoke test Windows release archive
        shell: pwsh
        run: ./scripts/smoke-windows-release.ps1
  cargo-deny:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - run: cargo install cargo-deny --version 0.20.2 --locked
      - run: cargo deny check
  cargo-audit:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - run: cargo install cargo-audit --version 0.22.2 --locked
      - run: cargo audit
  nix-flake-check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
      - run: nix flake check
  zizmor:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - run: python3 -m unittest scripts/test_publish_github_release_assets.py
      - name: Audit GitHub Actions supply chain
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pipx run --spec zizmor==1.25.2 zizmor .github
  bazel-matrix:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - name: Configure Bazel caches
        run: cp .github/workflows/ci.bazelrc "$HOME/.bazelrc"
      - name: Mount Bazel caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/bazel-disk
            ~/.cache/bazel-repo
          key: bazel-cache-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('.bazelversion', '.bazelrc', '.github/workflows/ci.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock', 'Cargo.toml', 'Cargo.lock', '**/BUILD.bazel', '**/*.bzl', '**/*.rs') }}
          restore-keys: |
            bazel-cache-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
      - run: go install github.com/bazelbuild/bazelisk@v1.26.0
      - run: PATH="$HOME/go/bin:$PATH" ./scripts/test-bazel-matrix.sh
  mcp-conformance:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - run: make mcp-conformance
  claude-code-compatibility:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version: "22" }
      - run: npm ci --prefix scripts/compat
      - run: PATH="$PWD/scripts/compat/node_modules/.bin:$PATH" make test-claude-code
  fuzz-smoke:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - run: rustup toolchain install nightly --profile minimal
      - run: cargo install cargo-fuzz --version 0.13.2 --locked
      - run: make fuzz-smoke
