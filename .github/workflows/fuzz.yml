name: Scheduled fuzzing
on:
  workflow_dispatch:
  schedule:
    - cron: "43 5 * * 6"
permissions: {}
concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: false
jobs:
  fuzz:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        target: [bep_framing, bep_event_stream, named_file_sets, diagnostic_reducer, redaction, cursor_decode, lifecycle_sequence]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - run: rustup toolchain install nightly --profile minimal
      - run: cargo install cargo-fuzz --version 0.13.2 --locked
      - name: Fuzz selected target
        env:
          FUZZ_TARGET: ${{ matrix.target }}
        run: cd fuzz && cargo +nightly fuzz run "$FUZZ_TARGET" -- -max_total_time=300
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure()
        with:
          name: fuzz-${{ matrix.target }}
          path: fuzz/artifacts/
