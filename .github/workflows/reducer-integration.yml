name: Reducer integration

on:
  pull_request:
    paths:
      - ".github/workflows/reducer-integration.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "Makefile"
      - "crates/bazel-mcp-bep/**"
      - "crates/bazel-mcp-reducer/**"
      - "crates/bazel-mcp-reducer-cases/**"
      - "crates/bazel-mcp-runner/**"
      - "crates/bazel-mcp-server/**"
      - "crates/bazel-mcp-store/**"
      - "crates/bazel-mcp-types/**"
      - "examples/**"
      - "testdata/reducer-corpus/**"
      - "testdata/reducer-case.schema.json"
  push:
    branches: [main]
    paths:
      - ".github/workflows/reducer-integration.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "Makefile"
      - "crates/bazel-mcp-bep/**"
      - "crates/bazel-mcp-reducer/**"
      - "crates/bazel-mcp-reducer-cases/**"
      - "crates/bazel-mcp-runner/**"
      - "crates/bazel-mcp-server/**"
      - "crates/bazel-mcp-store/**"
      - "crates/bazel-mcp-types/**"
      - "examples/**"
      - "testdata/reducer-corpus/**"
      - "testdata/reducer-case.schema.json"
  schedule:
    - cron: "19 6 * * 2"
  workflow_dispatch:
    inputs:
      tier:
        description: Live reducer tier to run
        required: true
        default: platform
        type: choice
        options: [smoke, platform, heavy]

concurrency:
  group: reducer-integration-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

jobs:
  reducer-replay:
    name: Replay (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - run: cargo test -p bazel-mcp-reducer-cases --test corpus
      - if: runner.os == 'Linux'
        run: make check-reducer-case-schema

  reducer-live-changed:
    name: Live changed cases
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - run: go install github.com/bazelbuild/bazelisk@v1.26.0
      - run: cargo build -p bazel-mcp-server --bin bazel-mcp
      - name: Verify changed examples through MCP
        env:
          BASE_REF: ${{ github.base_ref }}
        run: >-
          cargo run -p bazel-mcp-reducer-cases -- verify --live --allow-empty
          --changed-from "origin/$BASE_REF"
          --bazel "$HOME/go/bin/bazelisk"

  reducer-live-smoke:
    name: Live smoke
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.tier == 'smoke')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - run: go install github.com/bazelbuild/bazelisk@v1.26.0
      - run: cargo build -p bazel-mcp-server --bin bazel-mcp
      - run: >-
          cargo run -p bazel-mcp-reducer-cases -- verify --live
          --tag live-smoke --bazel-version 9.2.0
          --bazel "$HOME/go/bin/bazelisk"

  reducer-live-platform:
    name: Live ${{ matrix.os }} / Bazel ${{ matrix.bazel }}
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.tier == 'platform')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        bazel: [8.4.2, 9.2.0]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - run: go install github.com/bazelbuild/bazelisk@v1.26.0
      - run: cargo build -p bazel-mcp-server --bin bazel-mcp
      - name: Locate platform executables
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "BAZELISK_BIN=$HOME/go/bin/bazelisk.exe" >> "$GITHUB_ENV"
            echo "MCP_SERVER_BIN=$PWD/target/debug/bazel-mcp.exe" >> "$GITHUB_ENV"
          else
            echo "BAZELISK_BIN=$HOME/go/bin/bazelisk" >> "$GITHUB_ENV"
            echo "MCP_SERVER_BIN=$PWD/target/debug/bazel-mcp" >> "$GITHUB_ENV"
          fi
      - name: Verify all supported fast cases through MCP
        env:
          BAZEL_VERSION: ${{ matrix.bazel }}
        shell: bash
        run: >-
          cargo run -p bazel-mcp-reducer-cases -- verify --live
          --tag fast --bazel-version "$BAZEL_VERSION"
          --server "$MCP_SERVER_BIN" --bazel "$BAZELISK_BIN"

  reducer-live-heavy:
    name: Live heavy cases
    if: github.event_name == 'workflow_dispatch' && inputs.tier == 'heavy'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - run: go install github.com/bazelbuild/bazelisk@v1.26.0
      - run: cargo build -p bazel-mcp-server --bin bazel-mcp
      - run: >-
          cargo run -p bazel-mcp-reducer-cases -- verify --live
          --tag heavy --allow-empty --bazel "$HOME/go/bin/bazelisk"
