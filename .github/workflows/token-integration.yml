name: Token integration
on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * 1"
permissions: {}
concurrency:
  group: token-integration
  cancel-in-progress: false
jobs:
  abseil:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { persist-credentials: false }
      - run: go install github.com/bazelbuild/bazelisk@v1.26.0
      - run: echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - run: ./scripts/benchmarks/setup-oss-corpus.sh abseil-cpp
      - run: ./scripts/benchmarks/run-token-integration.sh --project abseil-cpp --encoding o200k_base --samples 5 --assert-gates
      - name: Package deterministic benchmark evidence
        run: |
          run_id=$(< .cache/benchmarks/abseil-cpp/LATEST)
          python3 scripts/benchmarks/publish-token-report.py \
            ".cache/benchmarks/abseil-cpp/$run_id" \
            "$RUNNER_TEMP/abseil-token-report"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: abseil-token-report-${{ runner.os }}-${{ runner.arch }}
          path: ${{ runner.temp }}/abseil-token-report/
          retention-days: 30
